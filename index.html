<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Grade Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 id="main-heading">Student Grade Calculator</h1>

    <div class="calculator-container">
        <form>

            <div class="form-group">
                <label for="name">Student Name:</label>
                <input type="text" id="name" placeholder="Enter your name">
            </div>

            <div class="form-group">
                <label for="english">English Marks:</label>
                <input type="number" id="english" placeholder="Enter your marks">
            </div>

            <div class="form-group">
                <label for="maths">Mathematics Marks:</label>
                <input type="number" id="maths" placeholder="Enter your marks">
            </div>

            <div class="form-group">
                <label for="science">Science Marks:</label>
                <input type="number" id="science" placeholder="Enter your marks">
            </div>

            <button type="button" onclick="calculateResult()">Calculate Result</button>
            <button type="button" onclick="resetForm()">Reset</button>
        </form>


        <!-- for the js file to push the result -->
        <div id="display-result"></div>
    </div>

<script src="script.js"></script>
</body>
</html>
